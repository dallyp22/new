version: '3.8'
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: alpaca
      POSTGRES_PASSWORD: alpaca
      POSTGRES_DB: alpaca
    volumes:
      - postgres-data:/var/lib/postgresql/data
  redis:
    image: redis:7
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "15672:15672"
  backend:
    build:
      context: ..
      dockerfile: infra/Dockerfile.backend
    environment:
      - DB_URL=postgresql+asyncpg://alpaca:alpaca@postgres:5432/alpaca
      - REDIS_URL=redis://redis:6379
    depends_on:
      - postgres
      - redis
      - rabbitmq
    ports:
      - "8000:8000"
  model_server:
    build:
      context: ..
      dockerfile: infra/Dockerfile.backend
    command: ["uvicorn", "backend.model_server.main:app", "--host", "0.0.0.0", "--port", "8001"]
    depends_on:
      - backend
  frontend:
    build:
      context: ..
      dockerfile: infra/Dockerfile.frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
volumes:
  postgres-data:
